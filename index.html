<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title Calculator application></title>
    <link rel="stylesheet"  href="style.css">
</head>
<body>
    <div class = "calculator" >
        <h1>&rightarrow; CALCULATOR APP</h1>
        <input type="text" id="result" readonly aria-label="Result" placeholder="0" />
    <div class="keypad">
        <button onclick="clearResult()" class="resetBtn">C</button>
        <button onclick="deleteCharacter()" class="delBtn">&llarr;</button>
        <BR>
        <button onclick="appendToResult('/')" aria-label="Divide" class="opBtn">/</button>
        <button onclick="appendToResult('7')">7</button>
        <button onclick="appendToResult('8')">8</button>
        <button onclick="appendToResult('9')">9</button>
        <button onclick="appendToResult('*')" aria-label="Multiply" class="opBtn">*</button>
        <button onclick="appendToResult('4')">4</button>
        <button onclick="appendToResult('5')">5</button>
        <button onclick="appendToResult('6')">6</button>
        <button onclick="appendToResult('-')" aria-label="sub" class="opBtn">-</button>
        <button onclick="appendToResult('1')">1</button>
        <button onclick="appendToResult('2')">2</button>
        <button onclick="appendToResult('3')">3</button>
        <button onclick="appendToResult('+')" aria-label="add" class="opBtn">+</button>
        <button>0</button>
        <button onclick="appendToResult('.')">.</button>
        <BR>
        <button onclick="calculateresult()" aria-label="Equal" class="opBtn">=</button>
    </div>
    </div>
    <footer>
        "made with &hearts;"
        <!-- &OpenCurlyDoubleQuote;made with &hearts;&CloseCurlyDoubleQuote; -->
    </footer>
    <!-- adding java script -->
     <script src="scrip.js"></script>
</body>
</html>
